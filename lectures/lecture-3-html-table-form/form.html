<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML Forms</title>
  </head>
  <body>
    <h1>HTML Form Examples</h1>

    <!-- form element -->
    <h2>form element</h2>
    <form>this is a form element</form>

    <hr />

    <!-- form with input elements -->
    <h2>form with input elements</h2>
    <form>
      <input type="text" placeholder="Enter username" />
      <input type="password" placeholder="Enter password" />
      <input type="text" placeholder="Enter age" />
      <input type="date" />
    </form>

    <hr />

    <!-- form with inputs and labels -->
    <h2>form with inputs and labels</h2>
    <form>
      <label for="username">Username:</label>
      <input type="text" placeholder="Enter username" id="username" />
      <label for="password">Password:</label>
      <input type="password" placeholder="Enter password" id="password" />
      <label for="age">Password:</label>
      <input type="text" placeholder="Enter age" id="age" />
      <label for="dob">Date of Birth:</label>
      <input type="date" id="dob" />
    </form>

    <hr />

    <!-- form with submit button -->
    <h2>form with submit button</h2>
    <form>
      <div>
        <label for="username">Username:</label>
        <input type="text" placeholder="Enter username" id="username" />
      </div>
      <div>
        <label for="password">Password:</label>
        <input type="password" placeholder="Enter password" id="password" />
      </div>
      <div>
        <label for="age">Age:</label>
        <input type="text" placeholder="Enter age" id="age" />
      </div>
      <div>
        <label for="dob">Date of Joining:</label>
        <input type="date" id="dob" />
      </div>
      <div>
        <button type="submit">Submit</button>
        <button type="reset">Reset</button>
      </div>
    </form>

    <hr />

    <!-- form with submit action and method -->
    <h2>form with submit action and method</h2>
    <form action="/create-user" method="get">
      <div>
        <label for="username">Username:</label>
        <input
          name="user-name"
          type="text"
          placeholder="Enter username"
          id="username"
          required
        />
      </div>
      <div>
        <label for="password">Password:</label>
        <input
          name="password"
          type="password"
          placeholder="Enter password"
          id="password"
          required
        />
      </div>
      <div>
        <label for="age">Age:</label>
        <input name="user-age" type="text" placeholder="Enter age" id="age" />
      </div>
      <div>
        <label for="dob">Date of Joining:</label>
        <input name="user-dob" type="date" id="dob" />
      </div>
      <div>
        <button type="submit">Submit</button>
        <button type="reset">Reset</button>
      </div>
    </form>
    <button type="submit">Submit - outside</button>
    <button type="button">Regular Button</button>

    <hr />

    <!-- form to search other sites -->
    <h2>form to search other sites</h2>
    <form action="https://www.google.com/search" method="get">
      <input type="text" name="q" />
      <button type="submit">Search Google</button>
    </form>
    <br />
    <form action="https://www.youtube.com/results" method="get">
      <input type="text" name="search_query" />
      <button type="submit">Search Youtube</button>
    </form>

    <hr />

    <!-- form with some other inputs -->
    <h2>form with some other inputs</h2>
    <form action="/example" method="get">
      <div>
        <input type="checkbox" id="tos" name="tos" />
        <label for="tos">Terms of Service</label>
      </div>

      <!-- Radio buttons example -->
      <fieldset>
        <legend>Select a size of Fries:</legend>

        <div>
          <input type="radio" id="small" name="fries" value="small" />
          <label for="small">Small</label>
        </div>

        <div>
          <input type="radio" id="medium" name="fries" value="medium" />
          <label for="medium">Medium</label>
        </div>

        <div>
          <input type="radio" id="large" name="fries" value="large" checked />
          <label for="large">Large</label>
        </div>
      </fieldset>

      <!-- Select / Dropdown example -->
      <br />
      <label for="drinks">Choose a drink size:</label>

      <select name="drinks" id="drinks">
        <option value="">--Please choose an option--</option>
        <option value="small">Small</option>
        <option value="regular">Regular</option>
        <option value="large" selected>Large</option>
        <option value="extra-large">Extra-Large</option>
      </select>

      <!-- Range input -->
      <br />
      <br />
      <div>
        <label for="straws">Choose how many straws?:</label>
        <input
          type="range"
          id="straws"
          name="straws"
          min="1"
          max="5"
          step="1"
          value="3"
        />
      </div>

      <!-- Textarea example -->
      <br />
      <div>
        <label for="note">Any additional note?:</label>
        <br />
        <textarea
          id="note"
          name="note"
          rows="5"
          cols="33"
          placeholder="Type any note here"
        ></textarea>
      </div>

      <div>
        <br />
        <button type="submit">Order</button>
      </div>
    </form>

    <!-- form with some basic validations -->
    <h2>form with some basic validations</h2>
    <form action="/validations" method="get">
      <div>
        <label for="fullname">Full Name:</label>
        <input
          name="fullname"
          type="text"
          placeholder="Enter Full Name"
          id="fullname"
          maxlength="30"
          required
        />
      </div>
      <div>
        <label for="username-v">Username:</label>
        <input
          name="username"
          type="text"
          placeholder="Enter username"
          id="username-v"
          minlength="5"
          maxlength="12"
          required
        />
      </div>
      <div>
        <label for="email">Email:</label>
        <input
          name="email"
          type="email"
          placeholder="Enter email"
          id="email"
          required
        />
      </div>
      <div>
        <label for="phone">
          Enter your phone number:<br />
          <small>Format: 123-456-7890</small>
        </label>

        <input
          type="tel"
          id="phone"
          name="phone"
          pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}"
          required
        />
      </div>
      <div>
        <br />
        <button type="submit">Submit</button>
      </div>
    </form>

    <br /><br /><br /><br /><br />
  </body>
</html>
