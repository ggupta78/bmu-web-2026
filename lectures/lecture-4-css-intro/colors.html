<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Color formats in CSS</title>
  </head>
  <body>
    <h1>Color formats in CSS</h1>

    <h2 style="color: blue">Named Colors, e.g. {color: blue}</h2>

    <h2 style="color: rgb(255, 0, 0)">rgb color format, e.g. rgb(255, 0, 0)</h2>

    <h2 style="color: rgba(255, 0, 0, 0.3)">
      rgba color format with alpha, e.g. rgba(255, 0, 0, 75)
    </h2>

    <h2 style="color: #00ff00">hex color format, e.g. #00ff00</h2>

    <h2 style="color: hsl(245, 100%, 50%)">
      hsl color format, e.g. hsl(245, 100%, 50%)
    </h2>
  </body>
</html>
